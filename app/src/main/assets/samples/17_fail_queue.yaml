# 失败队列重试（onFailureQueue）完整示例
# 演示：输出失败后放入 onFailureQueue，由队列消费者在下次 tick 时路由回同一输出重试
#
# 适用场景:
#   - MQTT / WebSocket / TCP 输出在链接断开时失败，希望保留消息并稍后重试
#   - 服务暂时不可用，消息需要延迟重发，不阻塞当前处理流程
#
# 架构图:
#   HTTP Input → Rule → MQTT Output → [失败] → fail_store (SQLite)
#                                                    ↓  (60s后, 按tick)
#                                       Queue Consumer → MQTT Output → [重试]
#
# 与旧版 FailQueueInput 的区别:
#   - 不再需要单独的 inputs.failQueue 配置
#   - 重试时直接路由回原始输出，无需额外规则
#   - 每个上游（linkId）独立重试，互不干扰


links:
  - id: mqtt_broker
    dsn: mqtt://localhost:1883
    reconnect:
      enabled: true
      interval: 10s

queues:
  sqlite:
    # 持久化失败队列：服务重启后消息不丢失
    fail_store:
      path: data://queues/fail_queue.db
      batchSize: 50
      retryInterval: 10s
      cleanup:
        maxAge: 7d           # 超过 7 天的旧条目自动清理

inputs:
  http:
    - name: http_in
      dsn: "http://0.0.0.0:8080"
      paths:
        - /message

outputs:
  link:
    - name: mqtt_out
      linkId: mqtt_broker
      role: producer
      topic: device/messages
      qos: 1
      retry:
        maxAttempts: 3          # 即时重试 3 次
        interval: 2s            # 每次等待 2 秒
      onFailureQueue:
        name: fail_store        # 所有重试失败后放入此队列
        delay: 60s              # 60 秒后重试（由队列消费者调度）

  http:
    - name: http_fallback
      url: http://fallback.example.com/receive
      method: POST
      timeout: 10s
      retry:
        maxAttempts: 2
        interval: 3s
      onFailureQueue:
        name: fail_store
        delay: 30s

rules:
  # 正常路径：接收 HTTP 消息，发布到 MQTT
  - name: forward_to_mqtt
    from: http_in
    pipeline:
      - to: [mqtt_out]
