# 输出格式化（Output Format）示例
# 演示：对每个输出单独格式化 data 和 header，不影响 pipeline 后续步骤
#
# ===========================================================================
# format 字段说明
# ===========================================================================
#
# format 写在 outputs 各条目内，仅对当前输出生效，不污染 pipeline 数据流。
#
# 字符串简写（等同于 $data 整体替换，注意 JSON 外层 { 需用 {{ 转义）:
#   format: '{{"data":"{base64Encode(data)}","type":"text"}'
#
# 数组形式（支持多步骤、处理 data 字段 / header）:
#   format:
#     - $data: 模板字符串           # 替换整个 data（字符串形式）
#     - $data.field: 模板字符串    # 设置/追加 JSON 字段
#     - $header: '{"K":"V"}'       # 整体替换 headers（模板结果必须是 JSON 对象）
#     - $header.X-Key: 模板字符串  # 设置/追加单个 header
#     - $delete: ["field1","field2"] # 从 data JSON 中删除字段
#     - $data:                          # Map 形式删除
#         delete: ["field1", "field2"]
#     - $header:                        # 删除 headers
#         delete: ["X-Unwanted"]
#
# 可用上下文变量（在模板中通过 {varName} 引用）:
#   {data}           - 原始数据（字符串）
#   {data.field}     - JSON 路径提取
#   $headers.X-Key   - 请求头
#   {$rule}          - 规则名称
#   {$source}        - 来源输入名
#   {$timestamp}     - 秒级时间戳（整数）
#   {$unix}          - 毫秒级时间戳
#   {$receivedAt}    - X-ReceivedAt 毫秒时间戳（InputManager 注入）
#   now()            - 当前秒级时间（整数）
#   now(3)           - 当前时间（保留3位小数）
#   uuidv4()         - 随机 UUID
#   deviceId()       - Android ID
#   base64Encode(data), jsonEncode(data), urlEncode(data) 等函数均支持
#
# ===========================================================================

outputs:
  link:
    # 基础示例：字符串简写，将 data 封装为 JSON
    - name: mqtt_wrapped
      linkId: mqtt_broker
      role: producer
      topic: output/wrapped
      qos: 1
      format: '{{"data":"{base64Encode(data)}","type":"text","ts":"{now(3)}"}'

    # 多字段示例：data 是 JSON，分别设置字段后再发送
    - name: mqtt_enriched
      linkId: mqtt_broker
      role: producer
      topic: output/enriched
      qos: 1
      format:
        - $data.deviceId: '{deviceId()}'
        - $data.sentAt: '{now(6)}'
        - $data.rule: '{$rule}'

    # Header 示例：为 HTTP 输出添加签名 header
  http:
    - name: http_signed
      url: https://api.example.com/ingest
      method: POST
      format:
        - $header.X-Device-Id: '{deviceId()}'
        - $header.X-Timestamp: '{now()}'
        - $data: '{jsonEncode(data)}'

    # 整体替换 data 为 JSON 封装格式
    - name: http_json_envelope
      url: https://api.example.com/event
      method: POST
      format: '{{"payload":{jsonEncode(data)},"source":"{$source}","ts":"{now(3)}","id":"{uuidv4()}"}}'

  internal:
    # 剪贴板：截取 JSON 中的 content 字段写入
    - name: clipboard_content
      type: clipboard
      format:
        - $data: '{data.content}'

    # 通知：删除敏感字段后再发送
    - name: notify_stripped
      type: notify
      title: "消息"
      format:
        - $delete: ["password", "token", "secret"]
        - $data: '{data.message}'

links:
  - id: mqtt_broker
    dsn: mqtt://broker.example.com:1883?clientId=mfca-device

inputs:
  http:
    - name: http_in
      dsn: "http://0.0.0.0:8080"
      paths:
        - /in

rules:
  # pipeline 中 format 不变，output 上的 format 独立封装
  - name: forward_with_envelope
    from: http_in
    pipeline:
      - transform:
          filter: "{length(data)} > 0"
        to: [mqtt_wrapped, http_json_envelope]

  # pipeline 中提取字段，output 再追加 meta 字段
  - name: enrich_and_send
    from: http_in
    pipeline:
      - transform:
          extract: 'payload'
        to: [mqtt_enriched]

  # output format 数组：先设 header 再格式化 data
  - name: signed_http
    from: http_in
    pipeline:
      - to: [http_signed]

  # 剪贴板：pipeline 保留完整 JSON，clipboard 只写 content 字段
  - name: clipboard_extract
    from: http_in
    pipeline:
      - to: [clipboard_content]
