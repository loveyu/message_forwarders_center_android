# TCP 连接示例
# 演示：TCP Socket 链接配置，适用于自定义协议或串口转网口设备

version: "2.0"

links:
  - id: tcp_device
    type: tcp
    host: 192.168.1.100
    port: 9000
    reconnect:
      enabled: true
      interval: 5s
      maxInterval: 60s

  - id: tcp_server
    type: tcp
    host: api.example.com
    port: 9001

inputs:
  link:
    - name: tcp_consumer
      linkId: tcp_device
      role: consumer

outputs:
  link:
    - name: tcp_producer
      linkId: tcp_device
      role: producer

rules:
  - name: tcp_forward
    from: tcp_consumer
    pipeline:
      - to: [tcp_producer]
