# TCP 连接示例
# 演示：TCP Socket 链接配置，支持 broker URL 格式和独立 host/port 格式

version: "2.0"

links:
  # Broker URL 格式 - 所有参数通过 URL query 传递
  - id: tcp_device
    type: tcp
    broker: tcp://192.168.1.100:9000?connectTimeout=5&soTimeout=30&keepAlive=true&noDelay=true&automaticReconnect=true&reconnectInterval=5&reconnectMaxInterval=60

  # 独立配置格式 (host/port) - reconnect 参数也通过 URL query
  - id: tcp_server
    type: tcp
    host: api.example.com
    port: 9001

  # TLS/SSL TCP 示例
  # - id: tcp_tls
  #   type: tcp
  #   broker: tcps://192.168.1.100:9002?connectTimeout=10&keepAlive=true
  #   tls:
  #     ca: /data/certs/ca.pem

inputs:
  link:
    - name: tcp_consumer
      linkId: tcp_device
      role: consumer

outputs:
  link:
    - name: tcp_producer
      linkId: tcp_device
      role: producer

rules:
  - name: tcp_forward
    from: tcp_consumer
    pipeline:
      - to: [tcp_producer]
