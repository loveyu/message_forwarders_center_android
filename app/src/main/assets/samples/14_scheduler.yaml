# 调度器配置
# 控制全局定时检查的间隔与事件驱动策略
#
# 所有健康检查（链路重连、输入源恢复、队列处理）
# 统一由单一 Ticker 调度器驱动，同时支持系统事件触发提前执行。
#
# 事件触发（受最小间隔保护）：
#   - 网络变更（WiFi/移动网络切换、网络恢复）
#   - 屏幕点亮
#   - 用户解锁设备
#   - 接入/断开充电器（自动切换间隔）
#   - APP 从后台回到前台（任意 Activity）


# ============================================
# 调度器配置
# ============================================
scheduler:
  # 定时检查间隔（默认 40s，最小 20s）
  # 所有健康检查、队列处理由此间隔驱动
  tickInterval: "40s"

  # 充电时的定时检查间隔（可选，默认与 tickInterval 一致）
  # 充电时可以使用更短的间隔以获得更快的响应
  # chargingTickInterval: "20s"

  # WakeLock 超时（默认 1h，设为 "0" 永久持有）
  # 用户启用 WakeLock 后，超时自动释放以防止耗电
  # wakeLockTimeout: "1h"

  # WifiLock 超时（默认 1h，设为 "0" 永久持有）
  # 用户启用 WifiLock 后，超时自动释放以防止耗电
  # wifiLockTimeout: "1h"
