# HTTP 共享输入示例
# 演示：多个 HTTP input 共用同一个端口（Shared HTTP Input）
#
# 通过 links 定义 HTTP 服务器地址，inputs.http 中使用 linkId 引用该 link，
# 实现多个 input 共享同一个监听端口，各自有独立的认证和路径。
#
# 路由匹配规则：精确匹配优先，多个 input 匹配同一路径时按 YAML 定义顺序取第一个


# 定义 HTTP 链接（仅 http://host:port，无额外参数）
links:
  - id: http_server
    dsn: http://0.0.0.0:31774

inputs:
  http:
    # 有 linkId → 共享服务器，DSN 仅 query 参数
    # 通知接口：Bearer Token 认证
    - name: http_notify
      linkId: http_server
      dsn: "?bearerToken=notify-secret-token"
      paths:
        - /notify

    # 管理接口：Basic 认证
    - name: http_admin
      linkId: http_server
      dsn: "?basicAuth=user:pass"
      paths:
        - /admin

    # 无 linkId → 独立服务器
    - name: http_standalone
      dsn: "http://0.0.0.0:31775?bearerToken=standalone-token"
      paths:
        - /webhook

outputs:
  internal:
    - name: log_all
      type: file
      basePath: sdcard://mfca/logs/http_shared
      fileName: "{yyyy}-{MM}-{dd}.log"
      options:
        append: true
        eof: "\n"

rules:
  # 处理通知接口的消息
  - name: handle_notify
    from: http_notify
    pipeline:
      - to: [log_all]

  # 处理管理接口的消息
  - name: handle_admin
    from: http_admin
    pipeline:
      - to: [log_all]

  # 处理独立接口的消息
  - name: handle_standalone
    from: http_standalone
    pipeline:
      - to: [log_all]
