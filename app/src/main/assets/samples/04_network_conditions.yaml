# 网络条件控制示例
# 演示：基于网络类型、WiFi SSID/BSSID、IP段的链接启用/禁用控制

version: "0.1"

links:
  # 示例1：仅在 WiFi 环境下启用
  - id: wifi_only_mqtt
    type: mqtt
    broker: tcp://192.168.1.10:1883
    enabledWhen:
      network:
        type: wifi

  # 示例2：仅在移动网络下启用
  - id: mobile_backup_mqtt
    type: mqtt
    broker: tcp://backup.example.com:1883
    enabledWhen:
      network:
        type: mobile

  # 示例3：WiFi 名称白名单（支持精确匹配和正则）
  - id: home_wifi_mqtt
    type: mqtt
    broker: tcp://home-server.local:1883
    enabledWhen:
      wifi:
        ssid:
          - "MyHomeWiFi"           # 精确匹配
          - "MyHomeWiFi-5G"        # 精确匹配
          - "~MyHomeWiFi-.*"       # 正则匹配（以 ~ 开头）

  # 示例4：WiFi BSSID 白名单
  - id: specific_ap_mqtt
    type: mqtt
    broker: tcp://192.168.1.1:1883
    enabledWhen:
      wifi:
        bssid:
          - "AA:BB:CC:DD:EE:FF"
          - "11:22:33:44:55:66"

  # 示例5：IP 段限制（仅在指定 IP 范围内启用）
  - id: local_network_mqtt
    type: mqtt
    broker: tcp://192.168.1.100:1883
    enabledWhen:
      network:
        type: wifi
        ipRanges:
          - "192.168.1.0/24"       # 192.168.1.1 - 192.168.1.254
          - "192.168.2.0/24"       # 192.168.2.1 - 192.168.2.254
          - "10.0.0.10"            # 精确匹配

  # 示例6：同时限制网络类型和 WiFi 条件
  - id: strict_home_mqtt
    type: mqtt
    broker: tcp://home-server.local:1883
    enabledWhen:
      network:
        type: wifi
        ipRanges: ["192.168.1.0/24"]
      wifi:
        ssid: ["MyHomeWiFi"]
        bssid: ["AA:BB:CC:DD:EE:FF"]

  # 示例7：任意网络类型（默认行为）
  - id: always_on_mqtt
    type: mqtt
    broker: tcp://any-server.example.com:1883
    enabledWhen:
      network:
        type: any
