# 规则引擎示例
# 演示：JSON 数据提取、过滤、媒体类型检测、Headers 访问、Base64 解码
#
# from 支持字符串或数组：
#   from: sensor_data                     # 单个输入源（字符串）
#   from: [sensor_data, filtered_clipboard]  # 多个输入源（数组，任一输入源匹配时触发）


links:
  - id: mqtt_broker
    dsn: mqtt://localhost:1883

inputs:
  link:
    # 示例：订阅多个主题
    - name: sensor_data
      linkId: mqtt_broker
      role: consumer
      topics:
        - sensors/#
        - devices/+
      qos: 1

    # 示例：排除特定主题
    - name: filtered_clipboard
      linkId: mqtt_broker
      role: consumer
      topic: phone-clipboard/#
      excludeTopics:
        - phone-clipboard/system
      qos: 1

outputs:
  http:
    - name: api_server
      url: http://api.example.com/data
      method: POST

  internal:
    - name: clipboard_out
      type: clipboard

rules:
  # 示例1：基础 JSON 字段提取
  - name: extract_temperature
    from: sensor_data
    pipeline:
      - transform:
          extract: "data.temperature"    # 提取 JSON 路径
        to: [api_server]

  # 示例2：提取后过滤（数组长度）
  - name: filter_by_array_length
    from: sensor_data
    pipeline:
      - transform:
          extract: "data.devices"
          filter: "len(data.devices) > 0"  # 只处理有设备的
        to: [api_server]

  # 示例3：字段值比较过滤
  - name: filter_by_value
    from: sensor_data
    pipeline:
      - transform:
          extract: "$raw"                # $raw 表示整个 JSON 对象
          filter: "data.status == 'active'"  # 只处理 active 状态
        to: [api_server]

  # 示例4：数值比较过滤
  - name: filter_by_number
    from: sensor_data
    pipeline:
      - transform:
          extract: "data.temperature"
          filter: "data.temperature > 25"   # 温度大于 25
        to: [clipboard_out]

  # 示例5：多媒体类型检测
  - name: detect_image
    from: sensor_data
    pipeline:
      - transform:
          detect: "image"                # 检测是否为图片
        to: [clipboard_out]

  # 示例6：JSON 类型检测
  - name: detect_json
    from: sensor_data
    pipeline:
      - transform:
          detect: "json"                 # 检测是否为 JSON
        to: [api_server]

  # 示例7：文本类型检测
  - name: detect_text
    from: sensor_data
    pipeline:
      - transform:
          detect: "text"                 # 检测是否为文本
        to: [clipboard_out]

  # 示例8：Headers 过滤 - 按 MQTT Topic 过滤
  - name: filter_by_mqtt_topic
    from: filtered_clipboard
    pipeline:
      - transform:
          filter: "$headers.mqtt_topic startsWith phone-clipboard/user"  # 只处理用户剪贴板
        to: [clipboard_out]

  # 示例9：Headers 过滤 - 排除特定 Topic
  - name: exclude_by_topic
    from: filtered_clipboard
    pipeline:
      - transform:
          filter: "$headers.mqtt_topic != phone-clipboard/system"  # 排除系统剪贴板
        to: [clipboard_out]

  # 示例10：完整变换链（提取 -> 过滤 -> 发送）
  - name: full_pipeline
    from: sensor_data
    pipeline:
      - transform:
          extract: "data.payload"
          filter: "data.type == 'sensor'"
          detect: "json"
        to: [api_server, clipboard_out]

  # 示例11：剪贴板内容读取（type=text + base64 decode）
  # 输入消息格式: {"type": "text", "content": "base64编码内容"}
  # filter 过滤 type!=text 的消息，extract 使用 base64Decode 函数解码 content 后写入剪贴板
  - name: clipboard_text_write
    from: filtered_clipboard
    pipeline:
      - transform:
          extract: "base64Decode(content)"
          filter: "type == 'text'"
        to: [clipboard_out]

  # 示例12：直接从 content 字段提取（不解码）
  - name: clipboard_content_only
    from: filtered_clipboard
    pipeline:
      - transform:
          extract: "content"
          filter: "type == 'text'"
        to: [clipboard_out]

  # 示例13：错误处理链
  - name: with_error_handling
    from: sensor_data
    pipeline:
      - transform:
          extract: "data.value"
        to: [api_server]
    onError:
      - to: [clipboard_out]             # 处理失败时复制到剪贴板

  # 示例14：enrich 丰富数据 - 通过 Gotify REST API 获取应用图标注入消息
  # Gotify 消息包含 appid 字段，enricher 调用 API 获取图标 URL 写入 icon 字段
  # 通知输出会自动读取 icon 字段显示对应应用图标
  # 需要配置 Gotify WebSocket link，格式: enrich: "gotifyIcon:<linkId>"
  # - name: gotify_with_icon
  #   from: gotify_input
  #   pipeline:
  #     - transform:
  #         enrich: "gotifyIcon:gotify_link"
  #       to: [gotify_notification]

  # 示例15：enrich 与其他 transform 组合使用
  # enrich 在 detect 之后、extract/filter 之前执行
  # - name: gotify_enrich_then_extract
  #   from: gotify_input
  #   pipeline:
  #     - transform:
  #         enrich: "gotifyIcon:gotify_link"
  #         extract: "$raw"
  #         filter: "appid > 0"
  #       to: [gotify_notification]

  # 示例16：from 使用数组，匹配多个输入源
  # 当 sensor_data 或 filtered_clipboard 任一输入源收到消息时都会触发此规则
  # - name: multi_source_rule
  #   from: [sensor_data, filtered_clipboard]
  #   pipeline:
  #     - transform:
  #         detect: "json"
  #       to: [api_server]

# 死信队列配置
deadLetter:
  enabled: true
  maxRetry: 3
  action:
    - to: [clipboard_out]               # 重试失败后保存到剪贴板
