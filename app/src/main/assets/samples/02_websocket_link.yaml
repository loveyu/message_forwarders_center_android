# WebSocket 连接示例
# 演示：WebSocket 链接配置，类型通过 DSN 协议自动判断 (ws:// → websocket, wss:// → websocket)
# 所有参数通过 DSN query 部分传递
#
# DSN 查询参数:
#   readTimeout           - 读超时(秒), 默认 30
#   writeTimeout          - 写超时(秒), 默认 30
#   pingInterval          - 心跳间隔(秒), 默认 30
#   username              - Basic Auth 用户名
#   password              - Basic Auth 密码
#   automaticReconnect    - 允许 LinkManager 自动重连, 默认 true
#   reconnectInterval     - 首次重连间隔(秒), 默认 10
#   reconnectMaxInterval  - 指数退避上限(秒), 默认 60
#   insecure              - 跳过 TLS 证书校验, 默认 false
#
# 重连策略: 指数退避 reconnectInterval × 2^失败次数, 上限 reconnectMaxInterval
#   连续失败 5 次后暂停, 由 LinkManager 每 10 分钟重置

links:
  # 标准 WebSocket - 类型从 DSN 自动识别
  - id: ws_server
    dsn: ws://localhost:8080/ws?readTimeout=30&writeTimeout=30&pingInterval=30

  # WSS (TLS) WebSocket - 未指定 tls 配置时使用系统证书并要求校验
  # - id: wss_system
  #   dsn: wss://secure.example.com/ws?readTimeout=60

  # 自定义 CA 证书 + 客户端证书 (mTLS)
  # - id: wss_mtls
  #   dsn: wss://secure.example.com/ws?readTimeout=60
  #   tls:
  #     ca: /data/certs/ca.pem
  #     cert: /data/certs/client.pem   # mTLS 客户端证书
  #     key: /data/certs/client.key    # mTLS 客户端私钥 (PKCS#8 PEM)

  # 跳过证书校验 (仅开发调试)
  # - id: wss_insecure
  #   dsn: wss://self-signed.example.com/ws?insecure=true

  # 带认证的 WebSocket
  # - id: ws_auth
  #   dsn: ws://localhost:8080/ws?username=foo&password=foo

  # Gotify WebSocket - 使用 protocol=gotify 启用 Gotify 协议
  # DSN 格式: ws(s)://host:port?token=xxx&protocol=gotify
  # 自动添加 /stream 路径，token 通过 query 参数传递
  # - id: gotify_server
  #   dsn: ws://gotify.example.com:80?token=YOUR_CLIENT_TOKEN&protocol=gotify

  # 使用 YAML 配置块设置重连参数（DSN 查询参数优先）
  # - id: ws_custom_reconnect
  #   dsn: ws://localhost:8080/ws
  #   reconnect:
  #     enabled: true
  #     interval: 10s
  #     maxInterval: 60s

inputs:
  link:
    - name: ws_input
      linkId: ws_server
      role: consumer

outputs:
  link:
    - name: ws_output
      linkId: ws_server
      role: producer

rules:
  - name: ws_echo
    from: ws_input
    pipeline:
      - to: [ws_output]

  # Gotify 消息转发示例 (需先定义 gotify_server 链接)
