# 快捷设置配置
# 控制通知栏快捷按钮的显示与行为
#
# quick_settings 下各配置项控制服务通知栏中的功能按钮


# ============================================
# 快捷设置
# ============================================
quick_settings:
  # 输入法切换按钮（默认 true）
  # 在服务通知栏显示"输入"按钮，点击弹出系统输入法选择器
  # 无论服务是否运行，该按钮都会显示在通知栏中
  input_method_switcher: true

  # 设为 false 可隐藏该按钮
  # input_method_switcher: false
