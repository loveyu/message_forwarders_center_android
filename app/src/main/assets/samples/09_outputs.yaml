# 输出模块示例
# 演示：HTTP 输出、Link 输出、Internal 输出（剪贴板/文件/广播/通知）

#
# 通知输出 (notify) 配置说明:
#
# 模板变量 (tag、group、id 支持):
#   {channel}      - 输出配置的 channel
#   {name}         - 输出配置的 name
#   {seq}          - 全局递增序列号 (0-999 循环)
#   {timestamp}    - 秒级时间戳 (10位)
#   {unix}         - 毫秒级时间戳 (13位)
#   {date:format}  - 格式化日期，如 {date:yyyyMMddHHmmss}
#   {data}         - 原始数据内容 (UTF-8 解码)
#   {data.field}   - JSON 路径提取 (当 data 为 JSON 时)
#   {meta.key}     - metadata 字段
#
# 标识字段:
#   tag   - 通知替换域，相同 tag+id 的通知替换旧通知。默认为 name (输出名称)
#   group - 通知栏视觉分组，相同 group 的通知折叠在一起。默认与 tag 相同
#   id    - 通知唯一标识 (Int 值)。默认为秒级时间戳 * 1000 + 序列号
#
# 默认值:
#   tag:   name (输出名称)
#   group: 与 tag 相同 (按 tag 自动分组)
#   id:    秒级时间戳 * 1000 + 序列号 (确保非1，避免与前台通知冲突)
#
# 运行时覆盖:
#   metadata:  notify_tag / notify_group / notify_id / notify_popup / notify_persistent (带 notify_ 前缀)
#   data JSON: 内容字段直接读取 (title/message/icon/fixedIcon)
#              控制字段使用 notify 前缀 (notifyTag/notifyGroup/notifyId/notifyPopup/notifyPersistent)


links:
  - id: mqtt_broker
    dsn: mqtt://localhost:1883

inputs:
  http:
    - name: http_in
      dsn: "http://0.0.0.0:8080"
      paths:
        - /webhook

outputs:
  # HTTP 输出
  http:
    - name: http_post
      url: http://api.example.com/webhook
      method: POST
      timeout: 5s
      retry:
        maxAttempts: 3
        interval: 1s

    - name: http_put
      url: http://api.example.com/update
      method: PUT
      timeout: 10s

  # Link 输出（发布到 MQTT / WebSocket / TCP）
  #
  # 完整参数说明:
  #   name          - 输出名称（唯一标识）
  #   linkId        - 关联的 link ID（从 links 配置中引用）
  #   role          - 固定为 producer（生产者）
  #   topic         - MQTT 发布主题（MQTT link 必填；WS/TCP link 忽略）
  #   qos           - MQTT QoS 级别 0/1/2（MQTT 专属，默认 1）
  #                     0 = 最多一次（不确认）
  #                     1 = 至少一次（默认，ACK 确认）
  #                     2 = 恰好一次（双重握手，最慢）
  #   retain        - MQTT retain 标志（MQTT 专属，默认 false）
  #                   true = broker 保留最后一条消息，新订阅者立即收到
  #   whenCondition - 启用条件（与 link 的 when 独立判断）
  #   deny          - 禁用条件
  #
  # retry（即时重试，发生在同一次 send 调用内）:
  #   maxAttempts   - 最大尝试次数（默认 1，即不重试；设为 3 = 首次+2次重试）
  #   interval      - 两次尝试之间的等待时长（默认 1s）
  #
  # onFailure（所有即时重试耗尽后的处理策略）:
  #   action        - discard（默认，丢弃）| failQueue（放入失败队列）
  #   idType        - 失败消息类型标识（action=failQueue 时必填）
  #                   同一队列中可混存多种 idType，由 FailQueueInput 按订阅过滤
  #   memoryQueue   - 目标内存队列名称（与 sqliteQueue 二选一）
  #   sqliteQueue   - 目标 SQLite 队列名称（与 memoryQueue 二选一，持久化）
  #   delay         - 消息在失败队列中等待多久后被重新注入为 input（默认 60s）
  #                   实际出队时间按 tick 近似（非严格精确）
  link:
    # 最简配置：只需 name、linkId、role、topic
    - name: mqtt_out
      linkId: mqtt_broker
      role: producer
      topic: output/topic

    # 完整 MQTT 参数示例
    - name: mqtt_full
      linkId: mqtt_broker
      role: producer
      topic: device/data
      qos: 1          # QoS 1（默认值）
      retain: false   # 不保留消息（默认值）
      retry:
        maxAttempts: 3    # 首次 + 2 次重试，共 3 次
        interval: 5s      # 每次重试前等待 5 秒
      onFailure:
        action: failQueue
        idType: mqtt_failures      # 失败消息的类型标识
        sqliteQueue: fail_store    # 持久化存储（服务重启后不丢失）
        delay: 120s                # 120 秒后由 FailQueueInput 重新注入

    # retain=true 示例：保留最后一次状态（适合设备状态上报）
    - name: mqtt_status
      linkId: mqtt_broker
      role: producer
      topic: device/status
      qos: 1
      retain: true    # 新订阅者立即收到最新状态

    # 默认重试后丢弃（不使用失败队列）
    - name: mqtt_best_effort
      linkId: mqtt_broker
      role: producer
      topic: sensor/data
      retry:
        maxAttempts: 2
        interval: 2s
      # onFailure 未配置或 action=discard 时，耗尽重试后静默丢弃

  # 内部输出 - 剪贴板
  internal:
    - name: copy_clipboard
      type: clipboard

    # 内部输出 - 文件
    - name: save_file
      type: file
      basePath: data://output
      options:
        autoExtension: true   # 自动添加 .dat 扩展名

    # 内部输出 - 广播
    - name: local_broadcast
      type: broadcast
      channel: app_events      # 广播通道名称

    # 内部输出 - 通知 (使用默认 tag/group/id)
    # tag 默认为 name ("default_notify")，group 默认与 tag 相同
    - name: default_notify
      type: notify
      channel: default

    # 内部输出 - 通知 (自定义 tag/group/id 模板)
    - name: custom_notify
      type: notify
      channel: alert
      options:
        # tag: 使用 channel 和日期分组，同一天的通知共享替换域
        tag: "{channel}_{date:yyyyMMdd}"
        # group: 通知栏视觉分组，相同 group 的通知折叠在一起
        group: "mfca_{channel}"
        # id: 纯数字模板，确保 toInt() 可解析
        id: "{timestamp}"
        # 自定义标题/内容模板
        title: "来自 {meta.sender} 的消息"
        message: "{data.content}"
        # 是否弹出通知 (仅支持 true/false 布尔值)
        popup: true
        # 是否持久化 (常驻通知)
        # persistent: false

    # 内部输出 - 通知 (从 data JSON 提取字段)
    - name: json_notify
      type: notify
      channel: json_alerts
      options:
        # data 数据示例: {"title":"xxx","message":"xxx","priority":"high"}
        title: "{data.title}"
        message: "{data.message}"
        # 从 data JSON 中提取嵌套字段作为 tag
        tag: "{data.priority}_{date:HHmm}"
        # 按优先级分组
        group: "mfca_priority_{data.priority}"

rules:
  # 复制到剪贴板
  - name: copy_to_clipboard
    from: http_in
    pipeline:
      - to: [copy_clipboard]

  # 保存到文件
  - name: save_incoming
    from: http_in
    pipeline:
      - to: [save_file]

  # 发送 HTTP POST
  - name: forward_to_api
    from: http_in
    pipeline:
      - to: [http_post]

  # 发布到 MQTT
  - name: publish_mqtt
    from: http_in
    pipeline:
      - to: [mqtt_out]

  # 发送广播
  - name: broadcast_event
    from: http_in
    pipeline:
      - to: [local_broadcast]

  # 发送默认通知
  - name: send_default_notify
    from: http_in
    pipeline:
      - to: [default_notify]

  # 发送自定义通知 (支持模板变量)
  - name: send_custom_notify
    from: http_in
    pipeline:
      - to: [custom_notify]

  # 发送 JSON 通知 (从 data 提取字段)
  - name: send_json_notify
    from: http_in
    pipeline:
      - to: [json_notify]

  # 多输出链
  - name: multi_output
    from: http_in
    pipeline:
      - to: [save_file, copy_clipboard, http_post]
