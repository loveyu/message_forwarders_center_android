# 数据编码封装示例
# 演示：在 pipeline format 步骤中对输出数据进行二次封装/编码
#
# 支持的编码函数（在 format 模板中使用 {func(arg)} 语法）:
#   base64Encode(data)            - 将数据进行 base64 编码
#   urlEncode(data)               - 将数据进行 URL 编码
#   jsonEncode(data)              - 对字符串进行 JSON 转义（转义 " \ \n 等）
#   httpBuildQuery(data)          - 将 JSON 对象转为 URL query string
#   now()                         - 当前秒级时间戳（整数）
#   nowMs()                       - 当前毫秒级时间戳（整数）
#   nowDate("yyyy-MM-dd HH:mm:ss") - 格式化当前时间
#
# 支持的上下文变量（在 format 模板中使用 {$var} 语法）:
#   {$rule}       - 当前规则名称
#   {$source}     - 输入源名称
#   {$timestamp}  - 当前秒级时间戳（同 now()）
#   {$unix}       - 当前毫秒级时间戳（同 nowMs()）
#
# 特殊数据变量:
#   {data}        - 当前数据（原始字符串）
#   {data.field}  - 从 JSON 数据提取字段（data 为 JSON 时）
#
# 使用场景:
#   - 接收纯文本，封装为 JSON 格式再发送到 MQTT/WebSocket（如 fcitx5 剪贴板协议）
#   - 将数据进行 URL 编码后拼接为 HTTP 请求参数
#   - 为消息附加时间戳、规则名等追踪元信息


links:
  - id: mqtt_broker
    dsn: mqtt://localhost:1883

inputs:
  http:
    - name: http_in
      dsn: "http://0.0.0.0:8080"
      paths:
        - /message

outputs:
  link:
    - name: mqtt_publish
      linkId: mqtt_broker
      role: producer
      topic: device/messages

  http:
    - name: http_api
      url: http://api.example.com/data
      method: POST

rules:
  # 示例1: 将纯文本封装为 JSON，base64 编码内容，附加时间戳和规则名
  # 输入: "hello world"
  # 输出: {"data":"aGVsbG8gd29ybGQ=","type":"text","timestamp":1234567890,"rule":"wrap_as_json"}
  - name: wrap_as_json
    from: http_in
    pipeline:
      - transform:
          format: '{"data":"{base64Encode(data)}","type":"text","timestamp":{now()},"rule":"{$rule}"}'
        to: [mqtt_publish]

  # 示例2: 将数据 URL 编码，适合拼接到 HTTP 参数
  # 输入: "hello world & more"
  # 输出: "hello+world+%26+more"
  - name: url_encode_data
    from: http_in
    pipeline:
      - transform:
          format: "{urlEncode(data)}"
        to: [http_api]

  # 示例3: JSON 字符串转义，安全嵌入 JSON 字段
  # 输入: he said "hello"
  # 输出: {"message":"he said \"hello\"","source":"http_in","time":1234567890}
  - name: json_escape_embed
    from: http_in
    pipeline:
      - transform:
          format: '{"message":"{jsonEncode(data)}","source":"{$source}","time":{now()}}'
        to: [http_api]

  # 示例4: 将 JSON 对象转为 URL query string
  # 输入 JSON: {"key1":"value1","key2":"value2"}
  # 输出: "key1=value1&key2=value2"
  - name: json_to_query
    from: http_in
    pipeline:
      - transform:
          detect: "json"
          format: "{httpBuildQuery(data)}"
        to: [http_api]

  # 示例5: 附加完整元信息（规则名、来源、时间、日期）
  # 适合下游系统追踪消息来源和时间
  - name: add_metadata
    from: http_in
    pipeline:
      - transform:
          format: '{"payload":"{base64Encode(data)}","meta":{"rule":"{$rule}","source":"{$source}","timestamp":{$timestamp},"date":"{nowDate("yyyy-MM-dd HH:mm:ss")}"}}'
        to: [mqtt_publish, http_api]

  # 示例6: 从 JSON 数据提取特定字段后 base64 编码
  # 输入 JSON: {"content":"hello","type":"text"}
  # 输出: {"data":"aGVsbG8=","type":"text"}
  - name: extract_and_encode
    from: http_in
    pipeline:
      - transform:
          filter: "type == 'text'"
          format: '{"data":"{base64Encode(content)}","type":"{type}"}'
        to: [mqtt_publish]

  # 示例7: 格式化当前时间戳
  # 在消息中注入当前时间，格式可自定义
  - name: add_timestamp
    from: http_in
    pipeline:
      - transform:
          format: '{"data":"{data}","createdAt":"{nowDate("yyyy-MM-dd HH:mm:ss")}","unix":{nowMs()}}'
        to: [http_api]
