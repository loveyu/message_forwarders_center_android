# 剪贴板转发示例
# 场景：订阅多个 MQTT broker 的剪贴板消息，统一处理后写入本地剪贴板
#
# 新特性：
#   linkId 支持字符串或数组，可同时订阅多个 link
#   from 支持字符串或数组，可匹配多个输入源


links:
  - id: mqtt_zzc
    # DSN 格式: mqtt://user:pass@host:port?param=value
    dsn: mqtt://foo:foo@10.4.125.53:1883?connectTimeout=3&keepAliveInterval=60&automaticReconnect=true&reconnectInterval=5&reconnectMaxInterval=60&clientId=foo

  - id: mqtt_home
    dsn: mqtt://foo:foo@10.11.11.8:1883?connectTimeout=3&keepAliveInterval=60&automaticReconnect=true&reconnectInterval=5&reconnectMaxInterval=60&clientId=foo

inputs:
  link:
    # 方式1：linkId 使用数组，同时订阅多个 broker 的同一主题
    - name: mqtt_clipboard
      linkId:
        - mqtt_zzc
        - mqtt_home
      role: consumer
      topic: $share/phone-k50/phone-clipboard/#
      qos: 1

    # 方式2：linkId 使用字符串
    # - name: mqtt_zzc_clipboard
    #   linkId: mqtt_zzc
    #   role: consumer
    #   topic: $share/phone-k50/phone-clipboard/#
    #   qos: 1

outputs:
  internal:
    - name: clipboard_write
      type: clipboard

rules:
  # 方式1：from 使用字符串（推荐：当输入源名唯一时）
  # 由于 mqtt_clipboard 已通过 link_id 数组聚合了多个 broker，
  # 消息的 source 统一为 mqtt_clipboard，所以 from 只需写一个名称
  - name: clipboard_text_write
    from: mqtt_clipboard
    pipeline:
      - transform:
          extract: "base64Decode(content)"
          filter: "type == text"
        to:
          - clipboard_write

  # 方式2：from 使用数组（当需要匹配多个不同名称的输入源时）
  # - name: clipboard_text_write
  #   from:
  #     - mqtt_zzc_clipboard
  #     - mqtt_home_clipboard
  #   pipeline:
  #     - transform:
  #         extract: "base64Decode(content)"
  #         filter: "type == text"
  #       to:
  #         - clipboard_write
