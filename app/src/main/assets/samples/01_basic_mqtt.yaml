# MQTT 基础连接示例
# 演示：MQTT 链接配置，类型通过 DSN 协议自动判断 (mqtt:// → mqtt, mqtts:// → mqtt)
# 所有连接参数通过 DSN 的 query 部分传递，支持 URL 编码


links:
  - id: local_mqtt
    # DSN 格式: mqtt://user:pass@host:port?param=value
    # 协议: mqtt:// (TCP), mqtts:// (TLS)
    # 参数: connectTimeout, keepAliveInterval, automaticReconnect,
    #       reconnectInterval, reconnectMaxInterval, username, password, clientId
    # clientId 默认使用设备 ID
    dsn: mqtt://foo:foo@localhost:1883?connectTimeout=3&keepAliveInterval=60&automaticReconnect=true&reconnectInterval=5&reconnectMaxInterval=60&clientId=client_001

  # TLS/SSL 连接示例 (mqtts:// 或带 tls 配置)
  # - id: mqtts_broker
  #   dsn: mqtts://localhost:8883?connectTimeout=10&keepAliveInterval=60
  #   tls:
  #     ca: https://example.com/certs/ca.pem      # 支持 https://, http:// 下载
  #     # ca: sdcard://Download/ca.pem              # 支持 sdcard://
  #     # ca: file:///data/certs/ca.pem             # 支持 file://
  #     # ca: data://certs/ca.pem                   # 支持 data:// 应用私有目录
  #     cert: file:///path/to/cert.pem  # 客户端证书 (可选)
  #     key: file:///path/to/key.pem    # 客户端私钥 (可选)

inputs:
  link:
    - name: mqtt_consumer
      linkId: local_mqtt
      role: consumer
      topic: sensor/data
      qos: 1

outputs:
  link:
    - name: mqtt_producer
      linkId: local_mqtt
      role: producer
      topic: actuator/commands

rules:
  - name: mqtt_forward
    from: mqtt_consumer
    pipeline:
      - to: [mqtt_producer]
