name: Build APK

on:
  push:
    branches:
      - main
      - dev
  release:
    types: [published]

jobs:
  debug:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Find Debug APK
      id: find_apk
      run: |
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        APK_NAME="MFCenter-${{ github.ref_name }}-debug.apk"
        cp "$APK_PATH" "$APK_NAME"
        echo "apk_path=$APK_NAME" >> $GITHUB_OUTPUT
        echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

    - name: Upload Debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: MFCenter-${{ github.ref_name }}-debug-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Determine version name
      id: build_info
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version_name=${VERSION}" >> $GITHUB_OUTPUT
        else
          echo "version_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Create keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
        {
          echo "STORE_FILE=release.keystore"
          printf 'STORE_PASSWORD=%s\n' "$STORE_PASSWORD"
          printf 'KEY_ALIAS=%s\n' "$KEY_ALIAS"
          printf 'KEY_PASSWORD=%s\n' "$KEY_PASSWORD"
        } > keystore.properties

    - name: Build Release APK
      run: ./gradlew assembleRelease -PversionName=${{ steps.build_info.outputs.version_name }}

    - name: Find Release APK
      id: find_apk
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
        APK_NAME="MFCenter-${{ steps.build_info.outputs.version_name }}-release.apk"
        cp "$APK_PATH" "$APK_NAME"
        echo "apk_path=$APK_NAME" >> $GITHUB_OUTPUT
        echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

    - name: Build Raw Release APK (Tag only)
      if: github.event_name == 'release'
      run: |
        # Disable minification and resource shrinking using sed
        sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/' app/build.gradle.kts
        sed -i 's/isShrinkResources = true/isShrinkResources = false/' app/build.gradle.kts
        ./gradlew assembleRelease -PversionName=${{ steps.build_info.outputs.version_name }}
        # Restore original settings
        sed -i 's/isMinifyEnabled = false/isMinifyEnabled = true/' app/build.gradle.kts
        sed -i 's/isShrinkResources = false/isShrinkResources = true/' app/build.gradle.kts

    - name: Find Raw Release APK
      if: github.event_name == 'release'
      id: find_raw_apk
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
        APK_NAME="MFCenter-${{ steps.build_info.outputs.version_name }}-release-raw.apk"
        cp "$APK_PATH" "$APK_NAME"
        echo "apk_path=$APK_NAME" >> $GITHUB_OUTPUT
        echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

    - name: Upload Release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: MFCenter-${{ steps.build_info.outputs.version_name }}-release-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 30

    - name: Upload Raw Release APK artifact
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: MFCenter-${{ steps.build_info.outputs.version_name }}-release-raw-apk
        path: ${{ steps.find_raw_apk.outputs.apk_path }}
        retention-days: 30

    - name: Upload to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.find_apk.outputs.apk_name }}
          ${{ steps.find_raw_apk.outputs.apk_name }}
        name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Clean up keystore
      if: always()
      run: |
        rm -f app/release.keystore
        rm -f keystore.properties
